<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>OG template</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 1200px;
        height: 630px;
      }
      body {
        background: radial-gradient(120% 120% at 50% 28%, #17171a 0%, #0b0b0c 62%);
        color: #f5f5f5;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        -webkit-font-smoothing: antialiased;
      }
      .card {
        width: 1120px;
        height: 550px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 28px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 30px;
        text-align: center;
        padding: 0 90px;
      }
      .glyph {
        width: 150px;
        height: 150px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #141416;
        border-radius: 34px;
      }
      .glyph svg {
        width: 84px;
        height: 84px;
      }
      .label {
        font-size: 108px;
        font-weight: 700;
        letter-spacing: 2px;
        line-height: 1;
      }
      .tagline {
        font-size: 34px;
        font-weight: 400;
        color: #9aa0a6;
      }
      .site {
        font-size: 24px;
        letter-spacing: 1px;
        color: #55565c;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="glyph" id="glyph"></div>
      <div class="label" id="label"></div>
      <div class="tagline" id="tagline"></div>
      <div class="site" id="site"></div>
    </div>
    <script>
      const GLYPHS = {
        sun: {

        },
        moon: {
          vb: "0 0 384 512",
          color: "#cbd5e1",
          d: "M223.5 32C100 32 0 132.3 0 256S100 480 223.5 480c60.6 0 115.5-24.2 155.8-63.4c5-4.9 6.3-12.5 3.1-18.7s-10.1-9.7-17-8.5c-9.8 1.7-19.8 2.6-30.1 2.6c-96.9 0-175.5-78.8-175.5-176c0-65.8 36-123.1 89.3-153.3c6.1-3.5 9.2-10.5 7.7-17.3s-7.3-11.9-14.3-12.5c-6.3-.5-12.6-.8-19-.8z",

        },
      };
      const p = new URLSearchParams(location.search);
      const g = GLYPHS[p.get("glyph") || "image"];
      document.getElementById("glyph").innerHTML =
        '<svg viewBox="' + g.vb + '"><path fill="' + g.color + '" d="' + g.d + '"/></svg>';
      document.getElementById("label").textContent = p.get("label") || "";
      document.getElementById("tagline").textContent = p.get("tagline") || "";
      document.getElementById("site").textContent = p.get("site") || "";
    </script>
  </body>
</html>
